<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SDH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .auth-card { transform: translateY(0); transition: all 0.3s ease; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md auth-card">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-800 mb-2 bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent inline-block font-bold">SDH</h1>
            <p class="text-gray-500">Sign in to access your downloads</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <p id="error-msg" class="text-red-500 text-sm hidden bg-red-50 p-2 rounded-lg text-center"></p>

            <button id="login-btn" class="w-full px-6 py-3 font-semibold rounded-xl text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 transition-all transform hover:scale-[1.02] shadow-md">Login</button>
            <button id="signup-btn" class="w-full px-6 py-3 font-semibold rounded-xl text-gray-700 bg-gray-100 hover:bg-gray-200 transition-all">Create Account</button>
            
            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or</span></div>
            </div>

            <button id="guest-btn" class="w-full text-blue-500 hover:underline text-sm font-medium">Continue as Guest (Read-Only)</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const errorEl = document.getElementById('error-msg');

        // If already logged in, skip this page
        async function checkSession() {
            const { data } = await sbClient.auth.getSession();
            if (data.session || sessionStorage.getItem('sdh_guest') === 'true') {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        document.getElementById('login-btn').onclick = async () => {
            const { error } = await sbClient.auth.signInWithPassword({ 
                email: emailInput.value, 
                password: passInput.value 
            });
            if (error) showError(error.message);
            else window.location.href = 'index.html';
        };

        document.getElementById('signup-btn').onclick = async () => {
            const { error } = await sbClient.auth.signUp({ 
                email: emailInput.value, 
                password: passInput.value 
            });
            if (error) showError(error.message);
            else alert("Account created! Check your email for a verification link.");
        };

        document.getElementById('guest-btn').onclick = () => {
            sessionStorage.setItem('sdh_guest', 'true');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
