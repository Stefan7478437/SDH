<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .auth-card { transition: all 0.3s ease; }
        .view-transition { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-element { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md auth-card view-transition">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold mb-2 bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent inline-block">SDH</h1>
            <p id="view-subtitle" class="text-gray-500 font-medium">Sign in to your account</p>
        </div>

        <div class="space-y-4">
            <!-- Email (Shared) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Password (Shared) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Repeat Password (Register Mode Only) -->
            <div id="repeat-password-area" class="hidden-element">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Repeat Password</label>
                <input type="password" id="repeat-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Error Feedback -->
            <div id="error-box" class="hidden-element p-3 rounded-lg text-center text-sm font-medium"></div>

            <button id="action-btn" class="w-full px-6 py-3 font-bold rounded-xl text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 transition-all transform hover:scale-[1.01] shadow-md">
                Login
            </button>

            <div class="text-center mt-4">
                <button id="toggle-view-btn" class="text-sm text-gray-600 hover:text-blue-500 font-medium transition-colors">
                    Don't have an account? <span class="text-blue-600 font-bold">Sign Up</span>
                </button>
            </div>
            
            <div id="guest-divider" class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or</span></div>
            </div>

            <button id="guest-btn" class="w-full py-2 text-gray-500 hover:text-gray-700 text-sm font-medium transition-colors">Continue Anonymously</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const repeatInput = document.getElementById('repeat-password');
        const repeatArea = document.getElementById('repeat-password-area');
        const errorBox = document.getElementById('error-box');
        const actionBtn = document.getElementById('action-btn');
        const toggleBtn = document.getElementById('toggle-view-btn');
        const subtitle = document.getElementById('view-subtitle');

        let isLoginMode = true;

        function showMessage(msg, isWarning = false) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden-element');
            errorBox.className = isWarning 
                ? "p-3 rounded-lg text-center text-sm font-medium bg-amber-50 text-amber-700 border border-amber-200"
                : "p-3 rounded-lg text-center text-sm font-medium bg-red-50 text-red-700 border border-red-200";
        }

        function switchMode(toLogin) {
            isLoginMode = toLogin;
            errorBox.classList.add('hidden-element');
            
            if (isLoginMode) {
                subtitle.textContent = "Sign in to your account";
                actionBtn.textContent = "Login";
                toggleBtn.innerHTML = 'Don\'t have an account? <span class="text-blue-600 font-bold">Sign Up</span>';
                repeatArea.classList.add('hidden-element');
            } else {
                subtitle.textContent = "Create your account";
                actionBtn.textContent = "Register";
                toggleBtn.innerHTML = 'Already have an account? <span class="text-blue-600 font-bold">Log In</span>';
                repeatArea.classList.remove('hidden-element');
            }
        }

        async function performAuth() {
            const email = emailInput.value;
            const password = passInput.value;
            errorBox.classList.add('hidden-element');

            if (!email || !password) {
                showMessage("Email and password are required.");
                return;
            }

            if (isLoginMode) {
                const { error } = await sbClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    const msg = error.message.toLowerCase();
                    if (msg.includes("invalid login credentials")) {
                        // Check if it's likely a wrong password or just not found
                        // Note: Supabase often returns generic "Invalid login credentials" for security
                        showMessage("Incorrect password. Please try again.", true);
                    } else if (msg.includes("email not confirmed") || error.status === 400) {
                        showMessage("Account not found. Switch to 'Sign Up' to register this email.", true);
                    } else {
                        showMessage(error.message);
                    }
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                const repeatPassword = repeatInput.value;
                if (password !== repeatPassword) {
                    showMessage("Passwords do not match.");
                    return;
                }

                const { error } = await sbClient.auth.signUp({ email, password });
                if (error) {
                    showMessage(error.message);
                } else {
                    alert("Success! Check your email for a confirmation link.");
                    switchMode(true);
                }
            }
        }

        actionBtn.onclick = performAuth;
        toggleBtn.onclick = () => switchMode(!isLoginMode);
        
        document.getElementById('guest-btn').onclick = () => {
            sessionStorage.setItem('sdh_guest', 'true');
            window.location.href = 'index.html';
        };

        // Trigger action on Enter key
        [emailInput, passInput, repeatInput].forEach(el => {
            el.addEventListener('keypress', (e) => { if (e.key === 'Enter') performAuth(); });
        });

        // Start in Login Mode
        switchMode(true);
    </script>
</body>
</html>
