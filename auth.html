<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #f0f2f5, #e5e7eb); 
        }
        
        .auth-container { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Gradient Button Styling */
        .gradient-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #d946ef 100%);
            background-size: 200% 200%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .gradient-btn:hover {
            background-position: right center;
            transform: translateY(-1px);
            box-shadow: 0 15px 20px -3px rgba(59, 130, 246, 0.4);
        }

        .gradient-btn:active {
            transform: scale(0.98);
        }

        .hidden-view { display: none; }
        
        .section-animate {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
        }

        .show-section {
            max-height: 200px;
            opacity: 1;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-card" class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md auth-container relative overflow-hidden">
        
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="hidden-view absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
            <div class="spinner mb-2"></div>
            <p class="text-sm font-bold text-blue-600 tracking-tight">Preparing...</p>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-5xl font-black mb-2 bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent inline-block">SDH</h1>
            <p id="view-subtitle" class="text-gray-400 font-medium">Sign in to your account</p>
        </div>

        <div class="space-y-4">
            <div id="form-content">
                <!-- Email -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none bg-gray-50" />
                </div>

                <!-- Password -->
                <div class="mt-4">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none bg-gray-50" />
                </div>

                <!-- Repeat Password (Hidden initially) -->
                <div id="repeat-password-section" class="section-animate">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Repeat Password</label>
                    <input type="password" id="repeat-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none bg-gray-50" />
                </div>

                <!-- Error Messages -->
                <div id="error-box" class="section-animate overflow-hidden">
                    <div id="error-content" class="p-3 rounded-xl text-center text-sm font-semibold mt-2"></div>
                </div>

                <!-- Gradient Action Button -->
                <button id="action-btn" class="gradient-btn w-full mt-6 px-6 py-4 font-bold rounded-2xl text-white">
                    Login
                </button>

                <div class="text-center pt-4">
                    <button id="toggle-view-btn" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">
                        Don't have an account? <span class="font-bold underline">Sign Up</span>
                    </button>
                </div>
            </div>

            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-300 font-bold">Or</span></div>
            </div>

            <button id="guest-btn" class="w-full py-2 text-gray-400 hover:text-gray-600 text-xs font-bold tracking-widest uppercase transition-colors">Continue Anonymously</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const repeatInput = document.getElementById('repeat-password');
        const repeatSection = document.getElementById('repeat-password-section');
        const errorBox = document.getElementById('error-box');
        const errorContent = document.getElementById('error-content');
        const actionBtn = document.getElementById('action-btn');
        const toggleBtn = document.getElementById('toggle-view-btn');
        const subtitle = document.getElementById('view-subtitle');
        const loader = document.getElementById('loading-overlay');

        let isLoginMode = true;

        function showError(msg, type = 'danger') {
            errorContent.textContent = msg;
            errorBox.classList.add('show-section');
            errorContent.className = type === 'warning' 
                ? "p-3 rounded-xl text-center text-sm font-semibold bg-orange-50 text-orange-600 border border-orange-100"
                : "p-3 rounded-xl text-center text-sm font-semibold bg-red-50 text-red-600 border border-red-100";
        }

        function toggleMode() {
            loader.classList.remove('hidden-view');
            setTimeout(() => {
                isLoginMode = !isLoginMode;
                errorBox.classList.remove('show-section');
                
                if (isLoginMode) {
                    subtitle.textContent = "Sign in to your account";
                    actionBtn.textContent = "Login";
                    toggleBtn.innerHTML = 'Don\'t have an account? <span class="font-bold underline">Sign Up</span>';
                    repeatSection.classList.remove('show-section');
                } else {
                    subtitle.textContent = "Create your account";
                    actionBtn.textContent = "Register Now";
                    toggleBtn.innerHTML = 'Already have an account? <span class="font-bold underline">Log In</span>';
                    repeatSection.classList.add('show-section');
                }
                loader.classList.add('hidden-view');
            }, 600); 
        }

        async function handleAuth() {
            const email = emailInput.value;
            const password = passInput.value;
            errorBox.classList.remove('show-section');

            if (!email || !password) {
                showError("Please fill in your credentials.");
                return;
            }

            actionBtn.disabled = true;
            actionBtn.classList.add('opacity-70');

            if (isLoginMode) {
                const { error } = await sbClient.auth.signInWithPassword({ email, password });
                if (error) {
                    const msg = error.message.toLowerCase();
                    if (msg.includes("invalid login") || error.status === 400) {
                        showError("Incorrect password or email. Switch to 'Sign Up' if you're new.", "warning");
                    } else {
                        showError(error.message);
                    }
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                if (password !== repeatInput.value) {
                    showError("Passwords do not match!");
                } else {
                    const { error } = await sbClient.auth.signUp({ email, password });
                    if (error) showError(error.message);
                    else {
                        alert("Account created! Check your email to verify.");
                        toggleMode();
                    }
                }
            }
            actionBtn.disabled = false;
            actionBtn.classList.remove('opacity-70');
        }

        actionBtn.onclick = handleAuth;
        toggleBtn.onclick = toggleMode;
        
        document.getElementById('guest-btn').onclick = () => {
            sessionStorage.setItem('sdh_guest', 'true');
            window.location.href = 'index.html';
        };

        window.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAuth();
        });
    </script>
</body>
</html>
