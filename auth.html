<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .auth-card { transition: all 0.3s ease; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md auth-card">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold mb-2 bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent inline-block">SDH</h1>
            <p id="view-title" class="text-gray-500 font-medium">Sign in to your account</p>
        </div>

        <div class="space-y-4">
            <!-- Email Input (Shared) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Password Input (Shared) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Repeat Password (Sign Up Only) -->
            <div id="repeat-password-container" class="hidden-view">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Repeat Password</label>
                <input type="password" id="repeat-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 transition-all outline-none" />
            </div>

            <!-- Error Messages -->
            <div id="error-container" class="hidden-view p-3 rounded-lg text-center text-sm font-medium">
                <p id="error-text"></p>
            </div>

            <!-- Action Buttons -->
            <button id="main-action-btn" class="w-full px-6 py-3 font-bold rounded-xl text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 transition-all transform hover:scale-[1.01] shadow-md">
                Login
            </button>

            <div class="text-center mt-4">
                <button id="switch-view-btn" class="text-sm text-gray-600 hover:text-blue-500 font-medium">
                    Don't have an account? <span class="text-blue-600 font-bold">Sign Up</span>
                </button>
            </div>
            
            <div id="guest-divider" class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-gray-400">Or</span></div>
            </div>

            <button id="guest-btn" class="w-full py-2 text-gray-500 hover:text-gray-700 text-sm font-medium transition-colors">Continue Anonymously</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elements
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const repeatPassInput = document.getElementById('repeat-password');
        const repeatContainer = document.getElementById('repeat-password-container');
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        const actionBtn = document.getElementById('main-action-btn');
        const switchBtn = document.getElementById('switch-view-btn');
        const viewTitle = document.getElementById('view-title');

        let isLoginView = true;

        // View Switching Logic
        function setView(toLogin) {
            isLoginView = toLogin;
            errorContainer.classList.add('hidden-view');
            
            if (isLoginView) {
                viewTitle.textContent = "Sign in to your account";
                actionBtn.textContent = "Login";
                switchBtn.innerHTML = 'Don\'t have an account? <span class="text-blue-600 font-bold">Sign Up</span>';
                repeatContainer.classList.add('hidden-view');
            } else {
                viewTitle.textContent = "Create your account";
                actionBtn.textContent = "Register";
                switchBtn.innerHTML = 'Already have an account? <span class="text-blue-600 font-bold">Log In</span>';
                repeatContainer.classList.remove('hidden-view');
            }
        }

        function displayError(message, type = 'error') {
            errorContainer.classList.remove('hidden-view');
            errorText.textContent = message;
            
            if (type === 'auth-fail') {
                // Style for specific auth errors (e.g., Wrong password)
                errorContainer.className = "p-3 rounded-lg text-center text-sm font-medium bg-orange-50 text-orange-700 border border-orange-200";
            } else {
                // Standard red error
                errorContainer.className = "p-3 rounded-lg text-center text-sm font-medium bg-red-50 text-red-700 border border-red-200";
            }
        }

        // Authentication Logic
        async function handleAuth() {
            const email = emailInput.value;
            const password = passInput.value;
            
            if (!email || !password) {
                displayError("Please enter both email and password.");
                return;
            }

            if (isLoginView) {
                const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    // Logic for different error types
                    if (error.message.toLowerCase().includes("invalid login credentials")) {
                        displayError("Wrong password. Please try again.", 'auth-fail');
                    } else if (error.message.toLowerCase().includes("email not confirmed") || error.status === 400) {
                        displayError("This email is not registered. Would you like to create an account?", 'auth-fail');
                    } else {
                        displayError(error.message);
                    }
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                // Registration Logic
                const repeatPassword = repeatPassInput.value;
                if (password !== repeatPassword) {
                    displayError("Passwords do not match.");
                    return;
                }

                const { error } = await sbClient.auth.signUp({ email, password });
                if (error) {
                    displayError(error.message);
                } else {
                    alert("Registration successful! Check your email if confirmation is required.");
                    setView(true);
                }
            }
        }

        // Event Listeners
        actionBtn.onclick = handleAuth;
        switchBtn.onclick = () => setView(!isLoginView);
        
        document.getElementById('guest-btn').onclick = () => {
            sessionStorage.setItem('sdh_guest', 'true');
            window.location.href = 'index.html';
        };

        // Initialize view
        setView(true);
    </script>
</body>
</html>
