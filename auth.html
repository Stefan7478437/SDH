<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFT Studio - Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); transition: all 0.3s ease; }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-primary:disabled { opacity: 0.8; cursor: not-allowed; }
        
        .spinner {
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Transition Overlay */
        #prep-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(8px);
            transition: opacity 0.2s ease, visibility 0.2s;
        }
        
        #prep-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            display: flex !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo Only -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-white tracking-tight">AFT <span class="text-blue-400">Studio</span></h1>
        </div>

        <div class="glass-panel rounded-[2.5rem] p-8 shadow-2xl">
            
            <!-- Preparing Overlay -->
            <div id="prep-overlay" class="hidden">
                <div class="spinner mb-4"></div>
                <span class="text-sm font-bold text-blue-400 uppercase tracking-widest animate-pulse">Preparing...</span>
            </div>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 transition-all placeholder-slate-600" placeholder="name@email.com">
                </div>
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 transition-all placeholder-slate-600" placeholder="••••••••">
                </div>

                <div id="confirm-password-group" class="hidden">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 ml-1">Confirm Password</label>
                    <input type="password" id="confirm-password" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-blue-500 transition-all placeholder-slate-600" placeholder="••••••••">
                </div>

                <button type="submit" id="submit-btn" class="w-full btn-primary py-4 rounded-2xl font-bold text-white shadow-lg flex items-center justify-center min-h-[60px]">
                    <div id="loader" class="hidden"><div class="spinner"></div></div>
                    <span id="submit-btn-text">Sign In</span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggle-auth-mode" class="text-sm font-bold text-blue-400 hover:text-blue-300 transition-colors">
                    Don't have an account? Sign Up
                </button>
            </div>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700/50"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-black tracking-widest"><span class="bg-[#162033] px-4 text-slate-500">Or</span></div>
            </div>

            <button id="guest-btn" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 py-4 rounded-2xl font-bold text-slate-300 transition-all">
                Continue as Guest
            </button>
        </div>

        <p id="message-display" class="text-center mt-6 text-sm font-medium hidden"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const submitBtnText = document.getElementById('submit-btn-text');
        const loader = document.getElementById('loader');
        const prepOverlay = document.getElementById('prep-overlay');
        const toggleBtn = document.getElementById('toggle-auth-mode');
        const confirmGroup = document.getElementById('confirm-password-group');
        const confirmInput = document.getElementById('confirm-password');
        const messageDisplay = document.getElementById('message-display');

        let isSignUp = false;

        toggleBtn.onclick = () => {
            prepOverlay.classList.remove('hidden');
            
            setTimeout(() => {
                isSignUp = !isSignUp;
                
                confirmGroup.classList.toggle('hidden', !isSignUp);
                confirmInput.required = isSignUp;
                submitBtnText.textContent = isSignUp ? 'Create Account' : 'Sign In';
                toggleBtn.textContent = isSignUp ? 'Already have an account? Sign In' : "Don't have an account? Sign Up";
                messageDisplay.classList.add('hidden');
                
                prepOverlay.classList.add('hidden');
            }, 500); 
        };

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            messageDisplay.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isSignUp) {
                if (password !== confirmInput.value) {
                    showMessage("Passwords do not match", true);
                    setLoading(false);
                    return;
                }
                const { error } = await sbClient.auth.signUp({ email, password });
                handleResponse(error, "Check your email for the confirmation link!");
            } else {
                const { error } = await sbClient.auth.signInWithPassword({ email, password });
                handleResponse(error);
            }
        };

        function handleResponse(error, successMsg = null) {
            if (error) {
                setLoading(false);
                showMessage(error.message, true);
            } else if (successMsg) {
                setLoading(false);
                showMessage(successMsg, false);
            } else {
                window.location.href = 'index.html';
            }
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                submitBtnText.classList.add('hidden');
                loader.classList.remove('hidden');
            } else {
                submitBtnText.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }

        function showMessage(text, isError) {
            messageDisplay.textContent = text;
            messageDisplay.className = `text-center mt-6 text-sm font-medium ${isError ? 'text-red-400' : 'text-green-400'}`;
            messageDisplay.classList.remove('hidden');
        }

        document.getElementById('guest-btn').onclick = () => {
            sessionStorage.setItem('sdh_guest', 'true');
            window.location.href = 'index.html';
        };

        (async () => {
            const { data: { session } } = await sbClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        })();
    </script>
</body>
</html>
