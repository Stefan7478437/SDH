<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }
        .category-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">SDH</h1>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1 rounded-full">Guest Mode</span>
                <button id="logout-btn" class="text-sm font-bold text-red-500 hover:text-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8">
        <!-- Hero Section -->
        <div class="mb-10">
            <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">Downloads</h2>
            <p class="text-gray-500 mt-2 font-medium">Find and manage your digital assets.</p>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-wrap gap-2 mb-8" id="category-filters">
            <button data-cat="all" class="category-btn active px-6 py-2 rounded-xl text-sm font-bold border border-gray-200">All</button>
            <button data-cat="applications" class="category-btn px-6 py-2 rounded-xl text-sm font-bold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50">Applications</button>
            <button data-cat="games" class="category-btn px-6 py-2 rounded-xl text-sm font-bold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50">Games</button>
            <button data-cat="miscellaneous" class="category-btn px-6 py-2 rounded-xl text-sm font-bold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50">Miscellaneous</button>
        </div>

        <!-- Content Grid -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items will be injected here via JS -->
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Dummy Data with new categories
        const mockData = [
            { id: 1, name: "Photo Editor Pro", category: "applications", size: "124 MB", icon: "🎨" },
            { id: 2, name: "Cyber Rogue 2026", category: "games", size: "45 GB", icon: "🕹️" },
            { id: 3, name: "Privacy Patch", category: "miscellaneous", size: "2 MB", icon: "🛡️" },
            { id: 4, name: "Code Studio", category: "applications", size: "89 MB", icon: "💻" },
            { id: 5, name: "Infinite Racer", category: "games", size: "1.2 GB", icon: "🏎️" },
            { id: 6, name: "System Logs Explorer", category: "miscellaneous", size: "15 MB", icon: "📁" }
        ];

        const grid = document.getElementById('content-grid');
        const filterBtns = document.querySelectorAll('.category-btn');
        const userDisplay = document.getElementById('user-display');

        // Check Auth Status
        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';

            if (!session && !isGuest) {
                window.location.href = 'auth.html';
            } else if (session) {
                userDisplay.textContent = session.user.email;
            }
        }

        function renderItems(filter = 'all') {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? mockData : mockData.filter(i => i.category === filter);

            filtered.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-3xl p-6 card-hover relative overflow-hidden group">
                        <div class="text-4xl mb-4">${item.icon}</div>
                        <h3 class="text-xl font-bold text-gray-900">${item.name}</h3>
                        <p class="text-sm font-semibold text-blue-500 uppercase tracking-tighter mt-1">${item.category}</p>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-xs font-bold text-gray-400">${item.size}</span>
                            <button class="bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl hover:bg-blue-600 transition-colors">Download</button>
                        </div>
                    </div>
                `;
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active', 'bg-white', 'text-gray-600'));
                btn.classList.add('active');
                renderItems(btn.dataset.cat);
            });
        });

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        checkSession();
        renderItems();
    </script>
</body>
</html>
