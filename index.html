<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; margin: 0; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        }

        .category-btn {
            transition: all 0.2s ease;
            background: white;
            color: #6b7280;
        }

        .category-btn.active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Hover animation for card */
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Bridge to prevent the dropdown from closing when moving mouse */
        .dropdown-bridge::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 20px;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">SDH</h1>
            
            <!-- User Dropdown Menu -->
            <div class="relative group">
                <!-- Trigger Area -->
                <div class="flex items-center gap-2 px-4 py-2 rounded-2xl bg-gray-100 group-hover:bg-gray-200 cursor-pointer transition-colors">
                    <span id="user-display" class="text-sm font-bold text-gray-700">Guest Mode</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>

                <!-- Dropdown Card -->
                <div class="absolute right-0 mt-1 w-48 pt-2 hidden group-hover:block z-50">
                    <div class="dropdown-bridge bg-white border border-gray-100 rounded-2xl shadow-xl p-2 ring-1 ring-black ring-opacity-5">
                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-12">
        <div class="mb-10">
            <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">Downloads</h2>
            <p class="text-gray-500 mt-2 font-medium">Browse our library of software and tools.</p>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-wrap gap-3 mb-10" id="category-filters">
            <button data-cat="all" class="category-btn active px-6 py-2.5 rounded-xl text-sm font-bold border border-gray-200">All</button>
            <button data-cat="applications" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50">Applications</button>
            <button data-cat="games" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50">Games</button>
            <button data-cat="miscellaneous" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold border border-gray-200 hover:bg-gray-50">Miscellaneous</button>
        </div>

        <!-- Content Grid -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Items injected by JS -->
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const mockData = [
            { id: 1, name: "Photo Editor Pro", category: "applications", size: "124 MB", icon: "🎨" },
            { id: 2, name: "Cyber Rogue 2026", category: "games", size: "45 GB", icon: "🕹️" },
            { id: 3, name: "Privacy Patch v2", category: "miscellaneous", size: "2 MB", icon: "🛡️" },
            { id: 4, name: "Code Studio", category: "applications", size: "89 MB", icon: "💻" },
            { id: 5, name: "Infinite Racer", category: "games", size: "1.2 GB", icon: "🏎️" },
            { id: 6, name: "System Logs Tool", category: "miscellaneous", size: "15 MB", icon: "📁" }
        ];

        const grid = document.getElementById('content-grid');
        const filterBtns = document.querySelectorAll('.category-btn');
        const userDisplay = document.getElementById('user-display');

        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';

            if (!session && !isGuest) {
                window.location.href = 'auth.html';
            } else if (session) {
                userDisplay.textContent = session.user.email;
            }
        }

        function renderItems(filter = 'all') {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? mockData : mockData.filter(item => item.category === filter);

            filtered.forEach(item => {
                grid.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-[2rem] p-7 card-hover flex flex-col justify-between">
                        <div>
                            <div class="text-4xl mb-5">${item.icon}</div>
                            <h3 class="text-xl font-bold text-gray-900 leading-tight">${item.name}</h3>
                            <span class="inline-block mt-2 px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-lg">
                                ${item.category}
                            </span>
                        </div>
                        <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-50">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">${item.size}</span>
                            <button class="bg-gray-900 text-white text-xs font-bold px-5 py-2.5 rounded-xl hover:bg-blue-600 transition-all active:scale-95">
                                Download
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderItems(btn.dataset.cat);
            });
        });

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        checkSession();
        renderItems();
    </script>
</body>
</html>
