<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFT Studio - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; color: #f1f5f9; }
        .theme-bg-match { background-color: #1e293b !important; }
        .header-defined { background-color: #1e293b; border-bottom: 1px solid #334155; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); color: white; transition: all 0.3s ease; border: none; display: flex; align-items: center; justify-content: center; }
        .btn-gradient:hover { filter: brightness(1.2); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
        
        .category-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; transition: all 0.2s ease; cursor: pointer; white-space: nowrap; }
        .category-btn:hover { background: #334155; color: white; }
        .category-btn.active { background: #3b82f6 !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        .card-custom { background-color: #1e293b; border: 1px solid #334155; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-custom:hover { transform: translateY(-6px); border-color: #475569; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        
        .dropdown-menu-container { top: 100%; right: 0; min-width: 100%; }
        .admin-actions { display: none; }
        .edit-active .admin-actions { display: flex; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="header-defined sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black text-white tracking-tight">AFT <span class="text-blue-400">Studio</span></h1>
            
            <div class="relative group">
                <div class="flex items-center gap-3 px-4 py-2 rounded-t-2xl rounded-b-2xl group-hover:rounded-b-none border border-slate-700 bg-slate-800/40 group-hover:bg-slate-800 cursor-pointer transition-all">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </div>
                    <span id="user-display" class="text-sm font-bold text-slate-200 truncate max-w-[150px]">Loading...</span>
                </div>

                <div class="absolute dropdown-menu-container hidden group-hover:block z-50">
                    <div class="theme-bg-match border-x border-b border-slate-700 rounded-b-2xl shadow-2xl p-2 flex flex-col gap-1">
                        <div id="admin-controls" class="hidden flex-col gap-1">
                            <button id="admin-edit-toggle" class="w-full text-left px-4 py-2.5 text-sm font-bold text-blue-400 hover:bg-slate-800 rounded-xl transition-colors">Toggle Edit Mode</button>
                            <button id="admin-add-item" class="w-full text-left px-4 py-2.5 text-sm font-bold text-green-400 hover:bg-slate-800 rounded-xl transition-colors">New Item</button>
                            <hr class="border-slate-700 my-1">
                        </div>
                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-400 hover:bg-slate-800 rounded-xl transition-colors">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-12">
        
        <!-- Header Replacement Area -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-8 mb-12">
            <!-- Buttons replace "Library" text -->
            <div id="category-filters" class="flex flex-wrap gap-3">
                <button class="category-btn active px-8 py-3 rounded-2xl text-sm font-black uppercase tracking-widest" data-category="all">All</button>
                <button class="category-btn px-8 py-3 rounded-2xl text-sm font-black uppercase tracking-widest" data-category="applications">Applications</button>
                <button class="category-btn px-8 py-3 rounded-2xl text-sm font-black uppercase tracking-widest" data-category="games">Games</button>
                <button class="category-btn px-8 py-3 rounded-2xl text-sm font-black uppercase tracking-widest" data-category="miscellaneous">Miscellaneous</button>
            </div>

            <!-- Search Bar -->
            <div class="relative w-full lg:w-96">
                <input type="text" id="search-input" placeholder="Search library..." class="bg-slate-800/50 border border-slate-700 rounded-2xl px-5 py-3.5 text-sm focus:outline-none focus:border-blue-500 text-white w-full transition-all placeholder-slate-500">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
        </div>

        <p id="status-text" class="hidden text-center mb-8 text-blue-400 font-bold tracking-widest text-xs uppercase">🛠️ EDIT MODE: ON</p>

        <!-- Content Grid -->
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const grid = document.getElementById('content-grid');
        const userDisplay = document.getElementById('user-display');
        const statusText = document.getElementById('status-text');
        const searchInput = document.getElementById('search-input');
        const adminControls = document.getElementById('admin-controls');
        
        let currentData = [];
        let editMode = false;
        let selectedCategory = 'all';

        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';

            if (!session && !isGuest) { window.location.href = 'auth.html'; return; }

            if (session) {
                userDisplay.textContent = session.user.email;
                const { data: profile } = await sbClient.from('profiles').select('role').eq('id', session.user.id).maybeSingle();
                if (profile && profile.role === 'admin') {
                    adminControls.classList.remove('hidden');
                    adminControls.classList.add('flex');
                }
            } else { userDisplay.textContent = "Guest Mode"; }
            fetchData();
        }

        async function fetchData() {
            const { data, error } = await sbClient.from('downloads').select('*').order('created_at', { ascending: false });
            if (!error) { currentData = data; renderItems(); }
        }

        function renderItems() {
            const searchTerm = searchInput.value.toLowerCase();
            grid.innerHTML = '';

            const filtered = currentData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 font-medium">No results found for this category.</div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `card-custom rounded-[2.5rem] p-8 relative overflow-hidden ${editMode ? 'edit-active' : ''}`;
                card.innerHTML = `
                    <div class="admin-actions absolute top-4 right-4 gap-2 z-10">
                        <button onclick="deleteItem('${item.id}')" class="bg-red-500 text-white p-2 rounded-full hover:scale-110 shadow-lg transition-all">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                    <div class="text-4xl mb-6">${item.icon || '📦'}</div>
                    <h3 class="text-xl font-bold text-white leading-tight">${item.name}</h3>
                    <div class="mt-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-blue-400 bg-blue-400/10 px-2 py-1 rounded-md">${item.category || 'general'}</span>
                    </div>
                    <div class="flex justify-between items-center mt-8 pt-6 border-t border-slate-700/50">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-tighter">${item.size || 'N/A'}</span>
                        <a href="${item.url || '#'}" target="_blank" class="btn-gradient text-xs font-bold px-6 py-2.5 rounded-xl">Download</a>
                    </div>`;
                grid.appendChild(card);
            });
        }

        // Category Filter Logic
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCategory = btn.getAttribute('data-category');
                renderItems();
            };
        });

        // Admin Toggles
        document.getElementById('admin-edit-toggle').onclick = () => {
            editMode = !editMode;
            statusText.classList.toggle('hidden', !editMode);
            renderItems();
        };

        document.getElementById('admin-add-item').onclick = async () => {
            const name = prompt("Name:");
            const category = prompt("Category (applications/games/miscellaneous):", "applications");
            const url = prompt("URL:");
            const size = prompt("Size:", "N/A");
            
            if (!name || !category || !url) return;

            const { error } = await sbClient.from('downloads').insert([{ 
                name, category: category.toLowerCase(), url, size, icon: '📦' 
            }]);
            if (error) alert(error.message); else fetchData();
        };

        window.deleteItem = async (id) => {
            if (confirm("Delete?")) {
                await sbClient.from('downloads').delete().eq('id', id);
                fetchData();
            }
        };

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        searchInput.oninput = renderItems;
        checkSession();
    </script>
</body>
</html>
