<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFT Studio - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            color: #f1f5f9;
        }
        
        .theme-bg-match { 
            background-color: #1e293b !important; 
        }

        .header-defined { 
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-gradient:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .category-btn { 
            transition: all 0.2s ease; 
            background: #1e293b; 
            color: #94a3b8; 
            border: 1px solid #334155; 
        }
        .category-btn.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%) !important; 
            color: white !important; 
            border-color: transparent !important;
        }
        
        .card-custom { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-custom:hover { 
            transform: translateY(-6px); 
            border-color: #475569;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .dropdown-menu-container {
            top: 100%;
            right: 0;
            padding-top: 0;
            min-width: 100%;
        }

        .admin-feature { display: none; } 
        .edit-active .admin-actions { display: flex; }
        
        input::placeholder {
            color: #64748b;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="header-defined sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Branding -->
            <h1 class="text-3xl font-black text-white tracking-tight">AFT <span class="text-blue-400">Studio</span></h1>
            
            <!-- Account Menu -->
            <div class="relative group">
                <div class="flex items-center gap-3 px-4 py-2 rounded-t-2xl rounded-b-2xl group-hover:rounded-b-none border border-slate-700 bg-slate-800/40 group-hover:bg-slate-800 cursor-pointer transition-all shadow-inner">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center shadow-md shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <span id="user-display" class="text-sm font-bold text-slate-200 truncate max-w-[150px]">Guest Mode</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 shrink-0 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>

                <div class="absolute dropdown-menu-container hidden group-hover:block z-50">
                    <div class="theme-bg-match border-x border-b border-slate-700 rounded-b-2xl shadow-2xl p-2 ring-1 ring-black ring-opacity-5">
                        <button id="admin-edit-toggle" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-blue-400 hover:bg-slate-800 rounded-xl transition-colors flex items-center gap-2 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                            Edit Mode
                        </button>
                        <button id="admin-add-item" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-green-400 hover:bg-slate-800 rounded-xl transition-colors flex items-center gap-2 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            New Item
                        </button>
                        <hr id="admin-divider" class="admin-feature my-1 border-slate-700">
                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-400 hover:bg-slate-800 rounded-xl transition-colors">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
            <div>
                <h2 class="text-4xl font-extrabold text-white tracking-tight">Downloads</h2>
                <p id="status-text" class="text-slate-400 mt-2 font-medium">Browse our library of software and tools.</p>
            </div>
            <div class="relative w-full md:w-72">
                <input type="text" id="search-input" placeholder="Search items..." class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-white transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute right-4 top-3.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 mb-10" id="category-filters">
            <button data-cat="all" class="category-btn active px-6 py-2.5 rounded-xl text-sm font-bold">All</button>
            <button data-cat="applications" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Applications</button>
            <button data-cat="games" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Games</button>
            <button data-cat="miscellaneous" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Miscellaneous</button>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full py-20 text-center text-slate-500 animate-pulse">Loading library...</div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const grid = document.getElementById('content-grid');
        const userDisplay = document.getElementById('user-display');
        const adminElements = document.querySelectorAll('.admin-feature');
        const statusText = document.getElementById('status-text');
        const searchInput = document.getElementById('search-input');

        let currentData = [];
        let editMode = false;
        let currentFilter = 'all';

        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';

            if (!session && !isGuest) { window.location.href = 'auth.html'; return; }

            if (session) {
                userDisplay.textContent = session.user.email;
                const { data: profile } = await sbClient.from('profiles').select('role').eq('id', session.user.id).maybeSingle();
                if (profile && profile.role === 'admin') {
                    adminElements.forEach(el => el.style.display = 'flex');
                }
            }
            fetchData();
        }

        async function fetchData() {
            const { data, error } = await sbClient.from('downloads').select('*').order('created_at', { ascending: false });
            if (error) {
                grid.innerHTML = `<div class="col-span-full text-center text-red-400">Failed to load content.</div>`;
            } else {
                currentData = data;
                renderItems();
            }
        }

        function renderItems() {
            const searchTerm = searchInput.value.toLowerCase();
            grid.innerHTML = '';
            
            const filtered = currentData.filter(item => {
                const matchesCat = currentFilter === 'all' || item.category === currentFilter;
                const matchesSearch = item.name.toLowerCase().includes(searchTerm);
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">No results found for "${searchInput.value}"</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `card-custom rounded-[2.5rem] p-8 flex flex-col justify-between relative overflow-hidden ${editMode ? 'edit-active' : ''}`;
                card.innerHTML = `
                    <div class="admin-actions hidden absolute top-4 right-4 gap-2 z-10">
                        <button onclick="editItem('${item.id}')" class="btn-gradient p-2 rounded-full shadow-lg hover:scale-110">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                        </button>
                        <button onclick="deleteItem('${item.id}')" class="bg-red-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                    <div>
                        <div class="text-4xl mb-6">${item.icon || '📦'}</div>
                        <h3 class="text-xl font-bold text-white leading-tight">${item.name}</h3>
                        <span class="inline-block mt-3 px-3 py-1 bg-slate-900/40 text-blue-300 text-[10px] font-black uppercase tracking-widest rounded-lg">${item.category}</span>
                    </div>
                    <div class="flex justify-between items-center mt-10 pt-6 border-t border-slate-700/50">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-tighter">${item.size || 'N/A'}</span>
                        <a href="${item.url || '#'}" target="_blank" class="btn-gradient text-xs font-bold px-6 py-2.5 rounded-xl">Download</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.oninput = renderItems;

        document.getElementById('admin-edit-toggle').onclick = () => {
            editMode = !editMode;
            statusText.textContent = editMode ? "🛠️ ADMIN EDIT MODE ACTIVE" : "Browse our library of software and tools.";
            statusText.className = editMode ? "text-blue-400 font-bold mt-2 animate-pulse" : "text-slate-400 mt-2 font-medium";
            renderItems();
        };

        window.editItem = async (id) => {
            const item = currentData.find(i => i.id === id);
            const newName = prompt("Edit Name:", item.name);
            if (newName === null) return;
            const newUrl = prompt("Edit URL:", item.url);
            if (newUrl === null) return;

            const { error } = await sbClient.from('downloads').update({ name: newName, url: newUrl }).eq('id', id);
            if (error) alert(error.message); else fetchData();
        };

        window.deleteItem = async (id) => {
            if (!confirm("Are you sure you want to delete this item?")) return;
            const { error } = await sbClient.from('downloads').delete().eq('id', id);
            if (error) alert(error.message); else fetchData();
        };

        document.getElementById('admin-add-item').onclick = async () => {
            const name = prompt("Item Name:");
            if (!name) return;
            const category = prompt("Category (applications, games, miscellaneous):", "applications");
            const url = prompt("Download URL:");
            const size = prompt("File Size (e.g., 15MB):", "N/A");
            
            const { error } = await sbClient.from('downloads').insert([{ 
                name, 
                category: category.toLowerCase(), 
                url, 
                icon: '📦', 
                size 
            }]);
            
            if (error) alert(error.message); else fetchData();
        };

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.cat;
                renderItems();
            };
        });

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        checkSession();
    </script>
</body>
</html>
