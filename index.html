<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        
        /* More Defined Header Styling */
        .header-defined { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(8px); 
            border-bottom: 2px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .category-btn { transition: all 0.2s ease; background: white; color: #4b5563; border: 1px solid #d1d5db; }
        .category-btn.active { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8 !important; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; background: white; border: 1px solid #e5e7eb; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        .dropdown-container::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            height: 15px;
            background: transparent;
        }

        .admin-feature { display: none; } 
        .edit-active .edit-badge { display: flex; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Refined Header -->
    <nav class="header-defined sticky top-0 z-50 px-8 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <span class="text-white font-black text-xl">S</span>
                </div>
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">SDH <span class="text-blue-600">Hub</span></h1>
            </div>
            
            <div class="relative group dropdown-container">
                <div class="flex items-center gap-3 px-4 py-2 rounded-xl border border-gray-200 bg-white hover:border-blue-400 hover:shadow-sm cursor-pointer transition-all">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-200 to-gray-300 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <span id="user-display" class="text-sm font-bold text-gray-800">Guest Mode</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>

                <div class="absolute right-0 mt-2 w-56 hidden group-hover:block z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                    <div class="bg-white border-2 border-gray-100 rounded-2xl shadow-2xl p-2 ring-1 ring-black ring-opacity-5">
                        <div class="px-4 py-2 mb-1">
                            <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Account Actions</p>
                        </div>
                        <button id="admin-edit-toggle" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-xl transition-colors flex items-center gap-3 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                            Edit Entries
                        </button>

                        <button id="admin-add-item" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-green-600 hover:bg-green-50 rounded-xl transition-colors flex items-center gap-3 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Post New Tool
                        </button>

                        <hr class="admin-feature my-2 border-gray-100">

                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 mt-12">
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight">Software Library</h2>
                <p id="status-text" class="text-gray-500 mt-2 font-medium">Manage and access your tools securely.</p>
            </div>
            
            <div class="flex flex-wrap gap-2" id="category-filters">
                <button data-cat="all" class="category-btn active px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">All</button>
                <button data-cat="applications" class="category-btn px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">Apps</button>
                <button data-cat="games" class="category-btn px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">Games</button>
                <button data-cat="miscellaneous" class="category-btn px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">Misc</button>
            </div>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const grid = document.getElementById('content-grid');
        const userDisplay = document.getElementById('user-display');
        const adminElements = document.querySelectorAll('.admin-feature');
        const statusText = document.getElementById('status-text');

        let currentData = [];
        let editMode = false;

        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';

            if (!session && !isGuest) { window.location.href = 'auth.html'; return; }

            if (session) {
                userDisplay.textContent = session.user.email;
                const { data: profile } = await sbClient
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (profile && profile.role === 'admin') {
                    adminElements.forEach(el => el.style.display = 'flex');
                }
            }
            fetchData();
        }

        async function fetchData() {
            const { data, error } = await sbClient.from('downloads').select('*').order('created_at', { ascending: false });
            if (!error) { currentData = data; renderItems(); }
        }

        function renderItems(filter = 'all') {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? currentData : currentData.filter(i => i.category === filter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `rounded-[1.5rem] p-7 card-hover flex flex-col justify-between relative overflow-hidden ${editMode ? 'edit-active' : ''}`;
                card.innerHTML = `
                    <div class="edit-badge hidden absolute top-4 right-4 bg-blue-600 text-white p-2 rounded-full cursor-pointer hover:scale-110 z-10 shadow-lg" onclick="editItem('${item.id}')">
                        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                    </div>
                    <div>
                        <div class="text-4xl mb-5">${item.icon || '📦'}</div>
                        <h3 class="text-xl font-bold text-gray-900 leading-tight">${item.name}</h3>
                        <span class="inline-block mt-2 px-3 py-1 bg-gray-100 text-gray-600 text-[10px] font-black uppercase tracking-widest rounded-md">${item.category}</span>
                    </div>
                    <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">${item.size || 'N/A'}</span>
                        <a href="${item.url || '#'}" target="_blank" class="bg-blue-600 text-white text-xs font-bold px-6 py-2.5 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-100">Download</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('admin-edit-toggle').onclick = () => {
            editMode = !editMode;
            statusText.textContent = editMode ? "🛠️ ADMIN EDIT MODE ACTIVE" : "Manage and access your tools securely.";
            statusText.className = editMode ? "text-blue-600 font-bold mt-2" : "text-gray-500 mt-2 font-medium";
            renderItems();
        };

        window.editItem = async (id) => {
            const item = currentData.find(i => i.id === id);
            const newName = prompt("Edit Name:", item.name);
            if (newName === null) return;
            const newUrl = prompt("Edit URL:", item.url);
            const { error } = await sbClient.from('downloads').update({ name: newName, url: newUrl }).eq('id', id);
            if (error) alert(error.message); else fetchData();
        };

        document.getElementById('admin-add-item').onclick = async () => {
            const name = prompt("Item Name:");
            if (!name) return;
            const category = prompt("Category (applications, games, miscellaneous):", "applications");
            const url = prompt("Download URL:");
            const { error } = await sbClient.from('downloads').insert([{ name, category, url, icon: '📦', size: 'N/A' }]);
            if (error) alert(error.message); else fetchData();
        };

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderItems(btn.dataset.cat);
            };
        });

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        checkSession();
    </script>
</body>
</html>
