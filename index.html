<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDH - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; margin: 0; }
        
        /* High-Contrast Dark Header */
        .header-defined { 
            background: #1e293b; /* Deep Slate/Charcoal */
            border-bottom: 2px solid #0f172a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        /* Button Gradients */
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-gradient:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .category-btn { 
            transition: all 0.2s ease; 
            background: white; 
            color: #4b5563; 
            border: 1px solid #e2e8f0; 
        }
        .category-btn.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%) !important; 
            color: white !important; 
            border-color: transparent !important;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); 
        }
        
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; background: white; border: 1px solid #e5e7eb; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        /* Bridge for dropdown */
        .dropdown-container::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            height: 15px;
            background: transparent;
        }

        .admin-feature { display: none; } 
        .edit-active .edit-badge { display: flex; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="header-defined sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Title now white for contrast against dark background -->
            <h1 class="text-3xl font-black text-white tracking-tight">SDH <span class="text-blue-400">Hub</span></h1>
            
            <div class="relative group dropdown-container">
                <!-- User pill with dark border and slightly transparent white bg -->
                <div class="flex items-center gap-2 px-4 py-2 rounded-2xl border border-slate-700 bg-slate-800/50 hover:bg-slate-800 cursor-pointer transition-all shadow-inner">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <span id="user-display" class="text-sm font-bold text-slate-200">Guest Mode</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 transition-transform group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>

                <div class="absolute right-0 mt-2 w-52 hidden group-hover:block z-50">
                    <div class="bg-white border border-slate-200 rounded-2xl shadow-2xl p-2 ring-1 ring-black ring-opacity-5">
                        <button id="admin-edit-toggle" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-xl transition-colors flex items-center gap-2 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                            Toggle Edit Mode
                        </button>

                        <button id="admin-add-item" class="admin-feature w-full text-left px-4 py-2.5 text-sm font-bold text-green-600 hover:bg-green-50 rounded-xl transition-colors flex items-center gap-2 mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Add New Item
                        </button>

                        <hr class="admin-feature my-1 border-slate-100">

                        <button id="logout-btn" class="w-full text-left px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-12">
        <div class="mb-10">
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Downloads</h2>
            <p id="status-text" class="text-slate-500 mt-2 font-medium">Browse our library of software and tools.</p>
        </div>

        <div class="flex flex-wrap gap-3 mb-10" id="category-filters">
            <button data-cat="all" class="category-btn active px-6 py-2.5 rounded-xl text-sm font-bold">All</button>
            <button data-cat="applications" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Applications</button>
            <button data-cat="games" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Games</button>
            <button data-cat="miscellaneous" class="category-btn px-6 py-2.5 rounded-xl text-sm font-bold">Miscellaneous</button>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://davfpjqubzfxcwlwxmjg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_S-IH7rZQwgSvGncHvbNkiA_ETrg-hWY';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const grid = document.getElementById('content-grid');
        const userDisplay = document.getElementById('user-display');
        const adminElements = document.querySelectorAll('.admin-feature');
        const statusText = document.getElementById('status-text');

        let currentData = [];
        let editMode = false;

        async function checkSession() {
            const { data: { session } } = await sbClient.auth.getSession();
            const isGuest = sessionStorage.getItem('sdh_guest') === 'true';
            if (!session && !isGuest) { window.location.href = 'auth.html'; return; }
            if (session) {
                userDisplay.textContent = session.user.email;
                const { data: profile } = await sbClient.from('profiles').select('role').eq('id', session.user.id).maybeSingle();
                if (profile && profile.role === 'admin') {
                    adminElements.forEach(el => el.style.display = 'flex');
                }
            }
            fetchData();
        }

        async function fetchData() {
            const { data, error } = await sbClient.from('downloads').select('*').order('created_at', { ascending: false });
            if (!error) { currentData = data; renderItems(); }
        }

        function renderItems(filter = 'all') {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? currentData : currentData.filter(i => i.category === filter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white border border-slate-100 rounded-[2rem] p-7 card-hover flex flex-col justify-between relative overflow-hidden ${editMode ? 'edit-active' : ''}`;
                card.innerHTML = `
                    <div class="edit-badge hidden absolute top-4 right-4 btn-gradient p-2 rounded-full cursor-pointer hover:scale-110 z-10 shadow-lg" onclick="editItem('${item.id}')">
                        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                    </div>
                    <div>
                        <div class="text-4xl mb-5">${item.icon || '📦'}</div>
                        <h3 class="text-xl font-bold text-slate-900 leading-tight">${item.name}</h3>
                        <span class="inline-block mt-2 px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest rounded-lg">${item.category}</span>
                    </div>
                    <div class="flex justify-between items-center mt-8 pt-6 border-t border-slate-50">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">${item.size || 'N/A'}</span>
                        <a href="${item.url || '#'}" target="_blank" class="btn-gradient text-xs font-bold px-5 py-2.5 rounded-xl">Download</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('admin-edit-toggle').onclick = () => {
            editMode = !editMode;
            statusText.textContent = editMode ? "🛠️ ADMIN EDIT MODE ACTIVE" : "Browse our library of software and tools.";
            statusText.className = editMode ? "text-blue-600 font-bold mt-2 animate-pulse" : "text-slate-500 mt-2 font-medium";
            renderItems();
        };

        window.editItem = async (id) => {
            const item = currentData.find(i => i.id === id);
            const newName = prompt("Edit Name:", item.name);
            if (newName === null) return;
            const newUrl = prompt("Edit URL:", item.url);
            const { error } = await sbClient.from('downloads').update({ name: newName, url: newUrl }).eq('id', id);
            if (error) alert(error.message); else fetchData();
        };

        document.getElementById('admin-add-item').onclick = async () => {
            const name = prompt("Item Name:");
            if (!name) return;
            const category = prompt("Category (applications, games, miscellaneous):", "applications");
            const url = prompt("Download URL:");
            const { error } = await sbClient.from('downloads').insert([{ name, category, url, icon: '📦', size: 'N/A' }]);
            if (error) alert(error.message); else fetchData();
        };

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderItems(btn.dataset.cat);
            };
        });

        document.getElementById('logout-btn').onclick = async () => {
            await sbClient.auth.signOut();
            sessionStorage.removeItem('sdh_guest');
            window.location.href = 'auth.html';
        };

        checkSession();
    </script>
</body>
</html>
